spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/OscarRuiz21/microservice-config-data
          username: ${GITHUB_USER}
          password: ${GITHUB_TOKEN}
          clone-on-start: true
          default-label: main

server:
  port: 8888
