      accessModes: [ReadWriteOnce]
      resources: { requests: { storage: 1Gi } }
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: keycloak-db-pvc
    spec:
      accessModes: [ReadWriteOnce]
      resources: { requests: { storage: 1Gi } }